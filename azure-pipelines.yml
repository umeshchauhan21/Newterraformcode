trigger: none
pool: default


stages:
  - stage: Terraforminit
    displayName: Terraform Init
    jobs:
      - job: Terraforminit
        displayName: Terraform init
        steps:
        - task: TerraformTask@5
          inputs:
            provider: 'azurerm'
            command: 'init'
            workingDirectory: '$(System.DefaultWorkingDirectory)/Environment/Dev'
            backendServiceArm: 'workload_identity_sc'
            backendAzureRmResourceGroupName: 'my-rg'
            backendAzureRmStorageAccountName: 'stg20260118'
            backendAzureRmContainerName: 'tfstate'
            backendAzureRmKey: 'dev.tfstate'

  - stage: Terraformplan
    displayName: Terraform Plan
    jobs:
      - job: Terraformplan
        displayName: Terraformp Plan
        steps:

        - task: TerraformTask@5
          inputs:
            provider: 'azurerm'
            command: 'plan'
            workingDirectory: 'workingDirectory: ''$(System.DefaultWorkingDirectory)/Environment/Dev'''
            environmentServiceNameAzureRM: 'workload_identity_sc'

  - stage: Terraformapply
    displayName: Terraform Aplly
    jobs:
      - job: Terraformaply
        displayName: Terraform aply
        steps:
                

        - task: TerraformTask@5
          inputs:
            provider: 'azurerm'
            command: 'init'
            workingDirectory: '$(System.DefaultWorkingDirectory)/Environment/Dev'
            backendServiceArm: 'workload_identity_sc'
            backendAzureRmResourceGroupName: 'my-rg'
            backendAzureRmStorageAccountName: 'stg20260118'
            backendAzureRmContainerName: 'tfstate'
            backendAzureRmKey: 'dev.tfstate'

        - task: TerraformTask@5
          inputs:
            provider: 'azurerm'
            command: 'apply'
            workingDirectory: 'workingDirectory: ''$(System.DefaultWorkingDirectory)/Environment/Dev'''
            environmentServiceNameAzureRM: 'workload_identity_sc'

