trigger: none
pool: default

steps:
- task: TerraformTask@5
  inputs:
    provider: 'azurerm'
    command: 'init'
    workingDirectory: '$(System.DefaultWorkingDirectory)/Environment/Dev'
    backendServiceArm: 'workload_identity_sc'
    backendAzureRmResourceGroupName: 'my-rg'
    backendAzureRmStorageAccountName: 'stg20260118'
    backendAzureRmContainerName: 'tfstate'
    backendAzureRmKey: 'dev.tfstate'

- task: TerraformTask@5
  inputs:
    provider: 'azurerm'
    command: 'plan'
    workingDirectory: 'workingDirectory: ''$(System.DefaultWorkingDirectory)/Environment/Dev'''
    environmentServiceNameAzureRM: 'workload_identity_sc'


- task: TerraformTask@5
  inputs:
    provider: 'azurerm'
    command: 'apply'
    workingDirectory: 'workingDirectory: ''$(System.DefaultWorkingDirectory)/Environment/Dev'''
    environmentServiceNameAzureRM: 'workload_identity_sc'

